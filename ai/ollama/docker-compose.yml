version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    environment:
      - OLLAMA_ALLOW_INSECURE=true
    gpus:
      - driver: nvidia
        count: all
        capabilities: ["gpu"]

volumes:
  ollama-data:

